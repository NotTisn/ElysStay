# Production-ready Docker Compose for ElysStay
# Usage:
#   1. Copy .env.example to .env and set secure values
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# The API and Frontend images are built from local Dockerfiles.
# For a VPS deployment, push images to a registry and use image: instead of build:.

services:
  # ── Database ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: elys_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Identity Provider ─────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: elys_prod_keycloak
    command: start --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: ${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      start_period: 60s
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elys_prod_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Keycloak__Authority: "http://keycloak:8080/realms/elysstay"
      Keycloak__ClientId: "elysstay-be"
      Keycloak__ClientSecret: ${KEYCLOAK_BE_CLIENT_SECRET}
      Keycloak__RequireHttpsMetadata: "false"
      # ValidIssuer must match the public Keycloak URL the browser sees (token issuer claim)
      Keycloak__ValidIssuer: "${KEYCLOAK_PUBLIC_URL}/realms/elysstay"
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - internal

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ../ElysStay-fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost/api/v1}
        NEXT_PUBLIC_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost}
        NEXT_PUBLIC_KEYCLOAK_REALM: elysstay
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: elysstay-fe
    container_name: elys_prod_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── Reverse Proxy ─────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: elys_prod_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
      - keycloak
    networks:
      - internal

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
